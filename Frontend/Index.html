<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- foundation-float.min.css: Compressed CSS with legacy Float Grid -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/foundation-sites@6.8.1/dist/css/foundation-float.min.css" crossorigin="anonymous">

    <!-- foundation-prototype.min.css: Compressed CSS with prototyping classes -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/foundation-sites@6.8.1/dist/css/foundation-prototype.min.css" crossorigin="anonymous">

    <!-- foundation-rtl.min.css: Compressed CSS with right-to-left reading direction -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/foundation-sites@6.8.1/dist/css/foundation-rtl.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="Decorator.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <title>Major picker</title>
</head>
<body>
<div class="LandingPage" id="landing" style="width: 100%;top: 0;left: 0;height: max-content">
    <!--    MENU BAR-->
    <div class="MenuBar large-12 medium-12 small-12 columns">
        <div class="Nav large-4 medium-6 small-6 columns" style="background: lightgreen">
            <a href="#Trang chu" class="Home large-4 medium-6 small-6 columns" style="text-align: center; color: floralwhite;">Trang chủ</a>
            <a href="#Ve chung toi" class="About large-5 medium-6 small-6 columns" style=" text-align: center; color: floralwhite;">Về chúng tôi</a>
        </div>
        <div class="Brand large-6 medium-6 small-6 columns" style="text-align: right">
            <div class=" Brand_name large-12 medium-12 small-12  columns" style="color: lightgoldenrodyellow; font-weight: lighter">MAJOR PICKER</div>
        </div>
    </div>
    <!-- SEPERATOR LINE    -->
    <div class="Seperator large-12 medium-12  small-12 columns"><hr style="min-width: 100%"></div>


    <div class="Underline" style="width:100%;height: fit-content(100%);position:absolute;top:125px">
        <div class="large-12 columns medium-12 small-12 columns Slogan" style="font-family:Poppins,sans-serif;color: #F5F5DC;text-decoration: none;align-self: center">Chọn ngành học , chọn tương lai</div>
        <div class="large-12 columns medium-12 small-12 columns Hook" style="font-family:Poppins,sans-serif;color: #D0B49B;text-decoration: none; text-align: center; align-self: center">Tìm hiểu ngành học phù hợp với bạn</div>
        <div class="Button large-12 medium-12 small-11 columns">
            <button class="button Start_button large-6 medium-6 small-6 columns" style=" border-radius: 50px;background:dimgrey; text-align: center;align-self: center;">Bắt đầu ngay</button>
        </div>
    </div>
    <img class="MainImage large-12 medium-12 small-12 cell" src="Image/new.png"></img>
</div>
</body>
</html>
